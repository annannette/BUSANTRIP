<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Busan Trip</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,600&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        body { background-color: #F5F2ED; font-family: 'Noto Sans TC', sans-serif; color: #4A342E; -webkit-tap-highlight-color: transparent; }
        .serif { font-family: 'Playfair Display', serif; }
        .date-btn.active { background-color: #4A342E !important; color: #F5F2ED !important; }
        .timeline-line::before { content: ''; position: absolute; left: 2.25rem; top: 0; bottom: 0; width: 1px; background-color: #D1CDC7; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="max-w-md mx-auto pb-40">

    <header class="p-6 flex justify-between items-center">
        <h1 class="serif text-3xl italic">Busan Trip</h1>
        <button onclick="openModal()" class="bg-[#4A342E] text-white w-10 h-10 rounded-full flex items-center justify-center shadow-lg">＋</button>
    </header>

    <nav class="flex gap-3 px-6 overflow-x-auto no-scrollbar pb-6 sticky top-0 bg-[#F5F2ED] z-20">
        <button onclick="changeDay(1)" id="b1" class="date-btn active flex-shrink-0 w-14 py-3 border border-[#D1CDC7] rounded-xl text-sm transition-colors">D1</button>
        <button onclick="changeDay(2)" id="b2" class="date-btn flex-shrink-0 w-14 py-3 border border-[#D1CDC7] rounded-xl text-sm transition-colors">D2</button>
        <button onclick="changeDay(3)" id="b3" class="date-btn flex-shrink-0 w-14 py-3 border border-[#D1CDC7] rounded-xl text-sm transition-colors">D3</button>
        <button onclick="changeDay(4)" id="b4" class="date-btn flex-shrink-0 w-14 py-3 border border-[#D1CDC7] rounded-xl text-sm transition-colors">D4</button>
        <button onclick="changeDay(5)" id="b5" class="date-btn flex-shrink-0 w-14 py-3 border border-[#D1CDC7] rounded-xl text-sm transition-colors">D5</button>
        <button onclick="changeDay(6)" id="b6" class="date-btn flex-shrink-0 w-14 py-3 border border-[#D1CDC7] rounded-xl text-sm transition-colors">D6</button>
    </nav>

    <main class="px-6 relative timeline-line" id="main-content">
        </main>

    <footer class="fixed bottom-0 left-0 right-0 bg-[#F5F2ED] border-t border-[#D1CDC7] p-6 max-w-md mx-auto flex justify-between items-center z-30">
        <span class="text-xs opacity-40 font-bold uppercase">Total Spend</span>
        <span id="day-total" class="serif text-2xl italic font-bold">NT$ 0</span>
    </footer>

    <div id="modal" class="hidden fixed inset-0 bg-black/40 backdrop-blur-sm z-50 flex items-end">
        <div class="w-full bg-white rounded-t-3xl p-8 max-w-md mx-auto">
            <div class="flex justify-between mb-6"><h2 class="serif text-xl italic">Add Expense</h2><button onclick="closeModal()">✕</button></div>
            <input id="in-name" type="text" placeholder="項目 (如: 炸雞)" class="w-full border-b mb-4 p-2 outline-none">
            <select id="in-cat" class="w-full border-b mb-4 p-2 outline-none">
                <option>飲食</option><option>交通</option><option>美妝</option><option>門票</option><option>伴手禮</option><option>衣服</option><option>紀念品</option>
            </select>
            <input id="in-krw" type="number" placeholder="韓幣 KRW" class="w-full border-b mb-6 p-2 outline-none">
            <button onclick="saveExpense()" class="w-full bg-[#4A342E] text-white py-4 rounded-xl font-bold">SAVE</button>
        </div>
    </div>

    <script>
        let currentDay = 1;
        const rate = 41;
        
        // 預設行程資料
        const plans = {
