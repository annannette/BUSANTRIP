<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Busan Travel App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,600&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        body { background-color: #F5F2ED; font-family: 'Noto Sans TC', sans-serif; color: #4A342E; }
        .serif { font-family: 'Playfair Display', serif; }
        .date-btn.active { background-color: #4A342E; color: #F5F2ED; border-radius: 12px; }
        .category-tag { font-size: 10px; padding: 2px 8px; border-radius: 999px; background: #E8E1D4; font-weight: bold; color: #8B5E3C; }
        .timeline-line::before { content: ''; position: absolute; left: 3.25rem; top: 0; bottom: 0; width: 1px; background-color: #D1CDC7; z-index: 0; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .day-content { display: none; }
        .day-content.active { display: block; }
    </style>
</head>
<body class="max-w-md mx-auto pb-40">

    <header class="p-8 flex justify-between items-end">
        <div>
            <p class="text-[10px] tracking-[0.2em] opacity-50 uppercase">Busan 2026</p>
            <h1 class="serif text-4xl italic mt-1">Itinerary</h1>
        </div>
        <button onclick="toggleExpenseModal()" class="bg-[#4A342E] text-white p-3 rounded-full shadow-lg">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
        </button>
    </header>

    <nav class="flex gap-3 px-6 overflow-x-auto no-scrollbar pb-6 sticky top-0 bg-[#F5F2ED] z-10">
        <button onclick="switchDay(1)" id="btn-1" class="date-btn active flex-shrink-0 w-16 py-3 border border-[#D1CDC7] rounded-xl text-sm">Day 1</button>
        <button onclick="switchDay(2)" id="btn-2" class="date-btn flex-shrink-0 w-16 py-3 border border-[#D1CDC7] rounded-xl text-sm">Day 2</button>
        <button onclick="switchDay(3)" id="btn-3" class="date-btn flex-shrink-0 w-16 py-3 border border-[#D1CDC7] rounded-xl text-sm">Day 3</button>
        <button onclick="switchDay(4)" id="btn-4" class="date-btn flex-shrink-0 w-16 py-3 border border-[#D1CDC7] rounded-xl text-sm">Day 4</button>
        <button onclick="switchDay(5)" id="btn-5" class="date-btn flex-shrink-0 w-16 py-3 border border-[#D1CDC7] rounded-xl text-sm">Day 5</button>
        <button onclick="switchDay(6)" id="btn-6" class="date-btn flex-shrink-0 w-16 py-3 border border-[#D1CDC7] rounded-xl text-sm">Day 6</button>
    </nav>

    <main class="px-6 relative timeline-line min-h-[300px]">
        <div id="itinerary-list">
            </div>
    </main>
