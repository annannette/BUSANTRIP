<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BUSAN TRIP 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,600&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #F5F2ED; /* 奶油色背景 */
            font-family: 'Noto Sans TC', sans-serif;
            color: #4A342E; /* 深棕色文字 */
        }
        .serif { font-family: 'Playfair Display', serif; }
        .date-active {
            background-color: #4A342E;
            color: #F5F2ED;
            border-radius: 12px;
        }
        /* 時間軸的垂直線 */
        .timeline-line::before {
            content: '';
            position: absolute;
            left: 3.25rem;
            top: 0;
            bottom: 0;
            width: 1px;
            background-color: #D1CDC7;
        }
    </style>
</head>
<body class="max-w-md mx-auto pb-10">

    <header class="p-6 flex justify-between items-center">
        <div>
            <p class="text-xs tracking-widest opacity-60">2026 / MAY</p>
            <h1 class="serif text-3xl italic mt-1">Busan Trip</h1>
        </div>
        <div class="flex gap-4">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9"></path></svg>
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 10h18M7 15h1m4 0h1m-7 4h12a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
        </div>
    </header>

    <nav class="flex gap-2 px-6 overflow-x-auto no-scrollbar pb-4">
        <div class="flex-shrink-0 px-4 py-2 text-center border border-[#D1CDC7] rounded-xl">
            <p class="text-[10px] opacity-60">FRI</p>
            <p class="font-bold">01</p>
        </div>
        <div class="flex-shrink-0 px-4 py-2 text-center border border-[#D1CDC7] rounded-xl">
            <p class="text-[10px] opacity-60">SAT</p>
            <p class="font-bold">02</p>
        </div>
        <div class="flex-shrink-0 px-4 py-2 text-center date-active">
            <p class="text-[10px] opacity-30">SUN</p>
            <p class="font-bold">03</p>
        </div>
        <div class="flex-shrink-0 px-4 py-2 text-center border border-[#D1CDC7] rounded-xl">
            <p class="text-[10px] opacity-60">MON</p>
            <p class="font-bold">04</p>
        </div>
        <div class="flex-shrink-0 px-4 py-2 text-center border border-[#D1CDC7] rounded-xl">
            <p class="text-[10px] opacity-60">TUE</p>
            <p class="font-bold">05</p>
        </div>
    </nav>

    <main class="mt-4 px-6 relative timeline-line">
        
        <div class="flex gap-8 mb-10 relative">
            <div class="w-10 text-right pt-1">
                <span class="text-xs font-medium opacity-60">14:00</span>
            </div>
            <div class="flex-1 bg-white p-4 rounded-2xl shadow-sm border border-[#E8E1D4]">
                <div class="flex justify-between items-start mb-1">
                    <span class="text-[10px] tracking-widest font-bold opacity-40 uppercase">Activity</span>
                    <span class="text-[10px] px-2 py-0.5 bg-[#F5F2ED] rounded-full">Line Pay</span>
                </div>
                <h3 class="font-bold text-lg mb-1">南浦洞樂天百貨</h3>
                <p class="text-xs opacity-60 mb-3">Artbox 買百變怪燈</p>
                <div class="pt-2 border-t border-dashed border-[#E8E1D4] flex justify-between items-center">
                    <span class="text-[10px] opacity-40">EXPENSE</span>
                    <span class="font-medium text-sm text-[#8B5E3C]">NT$ 1,651</span>
                </div>
            </div>
        </div>

        <div class="flex gap-8 mb-10 relative">
            <div class="w-10 text-right pt-1">
                <span class="text-xs font-medium opacity-60">18:00</span>
            </div>
            <div class="flex-1 bg-white p-4 rounded-2xl shadow-sm border border-[#E8E1D4]">
                <div class="flex justify-between items-start mb-1">
                    <span class="text-[10px] tracking-widest font-bold opacity-40 uppercase">Attraction</span>
                    <span class="text-[10px] px-2 py-0.5 bg-[#F5F2ED] rounded-full">Cash</span>
                </div>
                <h3 class="font-bold text-lg mb-1">龍頭山公園</h3>
                <p class="text-xs opacity-60 mb-3">釜山塔看夜景</p>
                <div class="pt-2 border-t border-dashed border-[#E8E1D4] flex justify-between items-center">
                    <span class="text-[10px] opacity-40">EXPENSE</span>
                    <span class="font-medium text-sm text-[#8B5E3C]">₩ 12,000</span>
                </div>
            </div>
        </div>

        <div class="flex gap-8 mb-10 relative">
            <div class="w-10 text-right pt-1">
                <span class="text-xs font-medium opacity-60">21:00</span>
            </div>
            <div class="flex-1 bg-[#E8E1D4] p-4 rounded-2xl shadow-sm border border-[#D1CDC7]">
                <div class="flex justify-between items-start mb-1">
                    <span class="text-[10px] tracking-widest font-bold opacity-40 uppercase">Food</span>
                    <span class="text-[10px] px-2 py-0.5 bg-white bg-opacity-50 rounded-full">聯邦卡</span>
                </div>
                <h3 class="font-bold text-lg mb-1">宵夜時間</h3>
                <p class="text-xs opacity-60 mb-3">超辣起司泡麵 + 可樂</p>
                <div class="pt-2 border-t border-dashed border-[#D1CDC7] flex justify-between items-center">
                    <span class="text-[10px] opacity-40">EXPENSE</span>
                    <span class="font-medium text-sm text-[#8B5E3C]">NT$ 188</span>
                </div>
            </div>
        </div>

    </main>

    <div class="fixed bottom-6 left-1/2 -translate-x-1/2 w-64 bg-[#4A342E] text-[#F5F2ED] px-6 py-4 rounded-full shadow-2xl flex justify-between items-center">
        <span class="text-xs tracking-widest opacity-60 uppercase">Day Total</span>
        <span class="text-lg font-bold serif italic">NT$ 1,839</span>
    </div>

</body>
</html>
