<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>Busan Travel Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #F8F9FA; --primary: #333333; --accent: #8E9775; --card: #FFFFFF; }
        body { background-color: var(--bg); font-family: 'Noto Sans TC', sans-serif; color: var(--primary); -webkit-tap-highlight-color: transparent; }
        .serif { font-family: 'Noto Serif TC', serif; }
        .tab-active { color: var(--accent); border-bottom: 2px solid var(--accent); }
        .nav-btn.active { background-color: var(--accent); color: white; border: none; }
        .tag-must-eat { background-color: #FEE2E2; color: #EF4444; border-radius: 4px; padding: 2px 6px; font-weight: bold; font-size: 10px; }
        .tag-must-buy { background-color: #FEF3C7; color: #D97706; border-radius: 4px; padding: 2px 6px; font-weight: bold; font-size: 10px; }
        .tag-info { background-color: #DBEAFE; color: #2563EB; border-radius: 4px; padding: 2px 6px; font-weight: bold; font-size: 10px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .section-view { display: none; }
        .section-view.active { display: block; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="max-w-md mx-auto">

    <header class="p-6 pt-10 sticky top-0 bg-[#F8F9FA]/80 backdrop-blur-md z-30">
        <div class="flex justify-between items-center mb-4">
            <h1 class="serif text-2xl tracking-tighter">釜山散策 2026</h1>
            <div id="weather-box" class="text-xs text-right opacity-70">
                <span class="block">Busan, KR</span>
                <span id="current-temp">22°C 晴時多雲</span>
            </div>
        </div>
        
        <nav class="flex border-b border-gray-200">
            <button onclick="showTab('itinerary')" id="tab-itinerary" class="tab-active flex-1 pb-2 text-sm font-medium">行程</button>
            <button onclick="showTab('info')" id="tab-info" class="flex-1 pb-2 text-sm font-medium">資訊</button>
            <button onclick="showTab('money')" id="tab-money" class="flex-1 pb-2 text-sm font-medium">記帳</button>
        </nav>
    </header>

    <div id="view-itinerary" class="section-view active p-6 space-y-8">
        <div class="flex gap-2 overflow-x-auto no-scrollbar pb-2">
            <button onclick="setDay(1)" id="d1" class="nav-btn active flex-shrink-0 w-12 py-2 border border-gray-300 rounded-lg text-xs">D1</button>
            <button onclick="setDay(2)" id="d2" class="nav-btn flex-shrink-0 w-12 py-2 border border-gray-300 rounded-lg text-xs">D2</button>
            <button onclick="setDay(3)" id="d3" class="nav-btn flex-shrink-0 w-12 py-2 border border-gray-300 rounded-lg text-xs">D3</button>
            <button onclick="setDay(4)" id="d4" class="nav-btn flex-shrink-0 w-12 py-2 border border-gray-300 rounded-lg text-xs">D4</button>
            <button onclick="setDay(5)" id="d5" class="nav-btn flex-shrink-0 w-12 py-2 border border-gray-300 rounded-lg text-xs">D5</button>
        </div>

        <div id="day-content" class="space-y-6 relative">
            </div>
    </div>

    <div id="view-info" class="section-view p-6 space-y-6">
        <div class="bg-white p-5 rounded-2xl shadow-sm space-y-4">
            <h2 class="serif text-lg border-l-4 border-accent pl-3">航班資訊</h2>
            <div class="grid grid-cols-2 gap-4 text-xs">
                <div><p class="opacity-40">去程航班</p><p class="font-bold">BX 794 (05/13)</p></div>
                <div><p class="opacity-40">登機時間</p><p class="font-bold">13:20 TPE</p></div>
            </div>
        </div>

        <div class="bg-white p-5 rounded-2xl shadow-sm space-y-4">
            <h2 class="serif text-lg border-l-4 border-accent pl-3">住宿資訊</h2>
            <p class="font-bold text-sm">南浦洞優雅酒店 (Nampo-dong Hotel)</p>
            <p class="text-xs opacity-60">確認代碼：#ANN-2026-BUSAN</p>
            <a href="https://map.naver.com/v5/search/Nampo-dong%20Hotel" target="_blank" class="block w-full text-center py-2 bg-gray-100 rounded-lg text-xs font-bold">查看地圖</a>
        </div>

        <div class="bg-white p-5 rounded-2xl shadow-sm space-y-4 text-red-500">
            <h2 class="serif text-lg border-l-4 border-red-400 pl-3">緊急聯絡</h2>
            <p class="text-xs">駐韓國台北代表部：+82-2-399-2800</p>
            <p class="text-xs">韓國緊急救援：119 / 112</p>
        </div>
    </div>

    <div id="view-money" class="section-view p-6 pb-40">
        <div class="bg-[#4A342E] text-white p-6 rounded-3xl mb-6">
            <p class="text-[10px] opacity-60 uppercase tracking-widest">Total Spent (TWD)</p>
            <h2 id="grand-total" class="serif text-4xl italic mt-1 font-bold">NT$ 0</h2>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-sm mb-8 space-y-4">
            <input id="exp-name" type="text" placeholder="項目名稱" class="w-full border-b p-2 outline-none text-sm">
            <div class="grid grid-cols-2 gap-4">
                <input id="exp-krw" type="number" placeholder="韓幣 KRW" class="border-b p-2 outline-none text-sm">
                <select id="exp-cat" class="border-b p-2 outline-none text-sm bg-transparent">
                    <option>🍔 飲食</option><option>🚌 交通</option><option>💄 美妝</option><option>🎟️ 門票</option><option>🎁 伴手禮</option>
                </select>
            </div>
            <button onclick="addExp()" class="w-full bg-[#8E9775] text-white py-3 rounded-xl font-bold text-sm">新增紀錄</button>
        </div>

        <div id="expense-history" class="space-y-3">
            </div>
    </div>

    <script>
        let currentDay = 1;
        const rate = 41;
        const itineraryData = {
            1: [
                { type: 'transport', time: '13:20', title: '桃園國際機場 (TPE)', loc: 'Taoyuan Airport' },
                { type: 'stay', time: '17:00', title: '飯店 Check-in', loc: 'Nampo Nampodong', tags: ['<span class="tag-info">預約號 #ANN2026</span>'] },
                { type: 'food', time: '19:00', title: '扎嘎其市場 (晚餐)', loc: 'Jagalchi Market', tags: ['<span class="tag-must-eat">必點：烤腸、生魚片</span>'] }
            ],
            2: [
                { type: 'attraction', time: '11:00', title: '廣安里海灘', loc: 'Gwangalli Beach', tags: ['<span class="tag-info">20:00 無人機表演</span>'] },
                { type: 'food', time: '13:00', title: '民樂生魚片中心', loc: 'Millak Raw Fish Center', tags: ['<span class="tag-must-eat">必吃美食：活章魚</span>'] }
            ],
            3: [
                { type: 'attraction', time: '10:00', title: 'F1963 工廠改造', loc: 'F1963 Busan', tags: ['<span class="tag-must-buy">必買：Yes24 限定文具</span>'] },
                { type: 'attraction', time: '15:00', title: '電影殿堂', loc: 'Busan Cinema Center' }
            ]
        };

        // 核心功能：切換 Tab
        function showTab(id) {
            document.querySelectorAll('.section-view').forEach(v => v.classList.remove('active'));
            document.getElementById('view-' + id).classList.add('active');
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('tab-active'));
            document.getElementById('tab-' + id).classList.add('tab-active');
        }

        // 行程管理
        function setDay(d) {
            currentDay = d;
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('d' + d).classList.add('active');
            renderItinerary();
        }

        function renderItinerary() {
            const list = document.getElementById('day-content');
            list.innerHTML = '';
            const dayItems = itineraryData[currentDay] || [];
            
            dayItems.forEach(item => {
                const navUrl = `https://map.naver.com/v5/search/${encodeURIComponent(item.loc)}`;
                list.innerHTML += `
                    <div class="flex gap-4 group">
                        <div class="w-12 text-right pt-1"><span class="text-[10px] font-bold opacity-30 tracking-tighter">${item.time}</span></div>
                        <div class="flex-1 bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
                            <div class="flex gap-2 mb-2">${item.tags ? item.tags.join('') : ''}</div>
                            <h4 class="font-bold text-sm text-[#333]">${item.title}</h4>
                            <div class="mt-4 flex justify-between items-center">
                                <span class="text-[9px] uppercase tracking-widest opacity-40">${item.type}</span>
                                <a href="${navUrl}" target="_blank" class="text-[10px] bg-black text-white px-3 py-1 rounded-full font-bold">NAVER MAP</a>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        // 記帳管理 (LocalStorage)
        let expenses = JSON.parse(localStorage.getItem('busan_final_exp')) || [];

        function addExp() {
            const name = document.getElementById('exp-name').value;
            const krw = Number(document.getElementById('exp-krw').value);
            const cat = document.getElementById('exp-cat').value;
            if(!name || !krw) return;

            expenses.unshift({ name, krw, cat, twd: Math.round(krw/rate), date: new Date().toLocaleDateString() });
            localStorage.setItem('busan_final_exp', JSON.stringify(expenses));
            document.getElementById('exp-name').value = '';
            document.getElementById('exp-krw').value = '';
            renderExp();
        }

        function renderExp() {
            const list = document.getElementById('expense-history');
            const totalDisplay = document.getElementById('grand-total');
            list.innerHTML = '';
            let sum = 0;
            expenses.forEach((e, idx) => {
                sum += e.twd;
                list.innerHTML += `
                    <div class="bg-white p-4 rounded-xl flex justify-between items-center text-xs">
                        <div><p class="font-bold">${e.name}</p><p class="opacity-40 text-[9px]">${e.cat} · ₩${e.krw.toLocaleString()}</p></div>
                        <div class="text-right"><p class="font-bold">NT$ ${e.twd}</p><button onclick="delExp(${idx})" class="text-[9px] text-red-300">刪除</button></div>
                    </div>
                `;
            });
            totalDisplay.innerText = `NT$ ${sum.toLocaleString()}`;
        }

        function delExp(idx) {
            expenses.splice(idx, 1);
            localStorage.setItem('busan_final_exp', JSON.stringify(expenses));
            renderExp();
        }

        // 初始化
        renderItinerary();
        renderExp();
    </script>
</body>
</html>
