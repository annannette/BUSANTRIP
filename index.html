<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Busan Trip Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,600&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #F5F2ED; font-family: 'Noto Sans TC', sans-serif; color: #4A342E; -webkit-tap-highlight-color: transparent; }
        .serif { font-family: 'Playfair Display', serif; }
        .date-btn.active { background-color: #4A342E !important; color: #F5F2ED !important; }
        .sub-tab { transition: all 0.3s; opacity: 0.4; }
        .sub-tab.active { opacity: 1; border-bottom: 2px solid #4A342E; font-weight: bold; }
        .card { background: white; border-radius: 24px; border: 1px solid #E8E1D4; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .view-section { display: none; }
        .view-section.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .tag-must { background: #FEE2E2; color: #EF4444; font-size: 10px; padding: 2px 8px; border-radius: 6px; font-weight: bold; }
    </style>
</head>
<body class="max-w-md mx-auto pb-40">

    <header class="p-8 pb-4">
        <div class="flex justify-between items-end">
            <div>
                <p class="text-[10px] tracking-[0.3em] opacity-40 uppercase">May 2026 / Busan</p>
                <h1 class="serif text-4xl italic font-semibold">Travelogue</h1>
            </div>
            <div class="text-right pb-1">
                <p id="weather" class="text-xs font-bold">釜山 22°C 🌤️</p>
            </div>
        </div>
    </header>

    <nav class="flex gap-3 px-6 overflow-x-auto no-scrollbar pb-4 sticky top-0 bg-[#F5F2ED]/90 backdrop-blur-md z-30">
        <button onclick="setDay(1)" id="d1" class="date-btn active flex-shrink-0 w-14 py-3 text-center border border-[#D1CDC7] rounded-xl bg-white">
            <p class="text-[9px] uppercase opacity-50">Thu</p><p class="text-lg font-bold">13</p>
        </button>
        <button onclick="setDay(2)" id="d2" class="date-btn flex-shrink-0 w-14 py-3 text-center border border-[#D1CDC7] rounded-xl bg-white">
            <p class="text-[9px] uppercase opacity-50">Fri</p><p class="text-lg font-bold">14</p>
        </button>
        <button onclick="setDay(3)" id="d3" class="date-btn flex-shrink-0 w-14 py-3 text-center border border-[#D1CDC7] rounded-xl bg-white">
            <p class="text-[9px] uppercase opacity-50">Sat</p><p class="text-lg font-bold">15</p>
        </button>
        <button onclick="setDay(4)" id="d4" class="date-btn flex-shrink-0 w-14 py-3 text-center border border-[#D1CDC7] rounded-xl bg-white">
            <p class="text-[9px] uppercase opacity-50">Sun</p><p class="text-lg font-bold">16</p>
        </button>
        <button onclick="setDay(5)" id="d5" class="date-btn flex-shrink-0 w-14 py-3 text-center border border-[#D1CDC7] rounded-xl bg-white">
            <p class="text-[9px] uppercase opacity-50">Mon</p><p class="text-lg font-bold">17</p>
        </button>
    </nav>

    <div class="flex px-6 mb-6 gap-5 border-b border-[#D1CDC7]/30">
        <button onclick="showSection('itinerary')" id="tab-itinerary" class="sub-tab active pb-2 text-xs uppercase tracking-widest">今日行程</button>
        <button onclick="showSection('expenses')" id="tab-expenses" class="sub-tab pb-2 text-xs uppercase tracking-widest">記帳明細</button>
        <button onclick="showSection('info')" id="tab-info" class="sub-tab pb-2 text-xs uppercase tracking-widest">航班住宿</button>
    </div>

    <div id="view-itinerary" class="view-section active px-6 space-y-6">
        </div>

    <div id="view-expenses" class="view-section px-6 space-y-6">
        <div class="card p-6 space-y-4">
            <input id="in-name" type="text" placeholder="項目名稱" class="w-full border-b border-gray-100 pb-2 outline-none text-sm">
            <div class="grid grid-cols-2 gap-4">
                <input id="in-krw" type="number" placeholder="韓幣 KRW" class="border-b border-gray-100 pb-2 outline-none text-sm">
                <select id="in-cat" class="border-b border-gray-100 pb-2 outline-none text-sm bg-transparent">
                    <option>🍔 飲食</option><option>🚌 交通</option><option>💄 美妝</option><option>🎟️ 門票</option><option>🎁 伴手禮</option>
                </select>
            </div>
            <button onclick="addExp()" class="w-full bg-[#4A342E] text-white py-3 rounded-xl font-bold text-[10px] tracking-widest">ADD RECORD</button>
        </div>
        <div id="exp-list" class="space-y-3 pb-20"></div>
    </div>

    <div id="view-info" class="view-section px-6 space-y-6">
        <div class="card p-6 border-l-4 border-l-[#8E9775]">
            <h3 class="serif text-lg italic mb-4">Flight Info</h3>
            <div class="space-y-3 text-sm">
                <div class="flex justify-between border-b border-dashed pb-2">
                    <span class="opacity-50">去程 BX 794</span><span class="font-bold">13:20 TPE</span>
                </div>
                <div class="flex justify-between border-b border-dashed pb-2">
                    <span class="opacity-50">回程 BX 793</span><span class="font-bold">11:05 PUS</span>
                </div>
            </div>
        </div>
        <div class="card p-6 border-l-4 border-l-[#4A342E]">
            <h3 class="serif text-lg italic mb-4">Stay Info</h3>
            <div class="space-y-1">
                <p class="text-sm font-bold">南浦洞優雅酒店 (Nampodong)</p>
                <p class="text-[10px] opacity-50">重要預約代號: #ANN-2026-BUSAN</p>
                <a href="https://map.naver.com/v5/search/Nampodong%20Hotel" target="_blank" class="block mt-4 text-[9px] font-bold underline">NAVER MAP 位置 →</a>
            </div>
        </div>
        <div class="p-4 rounded-2xl bg-red-50 text-red-800 text-[10px]">
            <p class="font-bold mb-1">緊急聯絡</p>
            <p>駐韓國代表部：+82-2-399-2800 / 救援 119</p>
        </div>
    </div>

    <footer class="fixed bottom-0 left-0 right-0 bg-[#F5F2ED] border-t border-[#D1CDC7] p-8 max-w-md mx-auto z-40">
        <div class="flex justify-between items-end">
            <div>
                <p class="text-[10px] opacity-40 uppercase tracking-widest mb-1">Day <span id="day-label">1</span> Total</p>
                <h2 id="total-amount" class="serif text-4xl italic font-bold">NT$ 0</h2>
            </div>
            <p class="text-[9px] opacity-30 font-bold">TWD/KRW ≈ 41</p>
        </div>
    </footer>

    <script>
        let currentDay = 1;
        const rate = 41;

        // 行程資料
        const plans = {
            1: [{t:"13:20", n:"抵達金海機場", s:"Take BX 794"}, {t:"17:00", n:"Hotel Check-in", s:"南浦洞中心區"}, {t:"19:00", n:"札嘎其市場", s:"必點: 烤腸、生魚片", must:true}],
            2: [{t:"11:00", n:"廣安里海灘", s:"釜山藍—廣安大橋", must:true}, {t:"20:00", n:"無人機表演", s:"週六限定表演"}],
            3: [{t:"10:30", n:"F1963 工廠改造", s:"必買: Yes24 限定文具", must:true}, {t:"15:00", n:"新世界百貨", s:"Centum City"}]
        };

        let expenses = JSON.parse(localStorage.getItem('busan_v12')) || {1:[], 2:[], 3:[], 4:[], 5:[]};

        function showSection(id) {
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.getElementById('view-' + id).classList.add('active');
            document.querySelectorAll('.sub-tab').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-' + id).classList.add('active');
        }

        function setDay(d) {
            currentDay = d;
            document.querySelectorAll('.date-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('d' + d).classList.add('active');
            document.getElementById('day-label').innerText = d;
            render();
        }

        function addExp() {
            const name = document.getElementById('in-name').value;
            const krw = document.getElementById('in-krw').value;
            const cat = document.getElementById('in-cat').value;
            if(!name || !krw) return;
            expenses[currentDay].unshift({ id: Date.now(), name, krw: Number(krw), twd: Math.round(krw/rate), cat });
            localStorage.setItem('busan_v12', JSON.stringify(expenses));
            document.getElementById('in-name').value = '';
            document.getElementById('in-krw').value = '';
            render();
        }

        function delExp(id) {
            expenses[currentDay] = expenses[currentDay].filter(e => e.id !== id);
            localStorage.setItem('busan_v12', JSON.stringify(expenses));
            render();
        }

        function render() {
            const itArea = document.getElementById('view-itinerary');
            itArea.innerHTML = '';
            (plans[currentDay] || []).forEach(p => {
                itArea.innerHTML += `
                    <div class="flex gap-6 mb-6">
                        <div class="w-10 text-right text-[10px] font-bold opacity-30 pt-1">${p.t}</div>
                        <div class="card flex-1 p-5">
                            ${p.must ? '<span class="tag-must">GUIDE CHOICE</span>' : ''}
                            <h3 class="font-bold text-sm mt-2">${p.n}</h3>
                            <p class="text-[10px] opacity-50 mt-1">${p.s}</p>
                            <div class="mt-4 flex justify-end">
                                <a href="https://map.naver.com/v5/search/${encodeURIComponent(p.n)}" target="_blank" class="text-[9px] font-bold border-b border-[#4A342E]">MAP →</a>
                            </div>
                        </div>
                    </div>`;
            });

            const exArea = document.getElementById('exp-list');
            exArea.innerHTML = '';
            let total = 0;
            expenses[currentDay].forEach(e => {
                total += e.twd;
                exArea.innerHTML += `
                    <div class="bg-white p-4 rounded-2xl flex justify-between items-center border border-[#E8E1D4] border-dashed">
                        <div><p class="text-[9px] opacity-40 font-bold">${e.cat}</p><p class="font-bold text-sm">${e.name}</p></div>
                        <div class="text-right">
                            <p class="font-bold text-sm serif italic text-[#8B5E3C]">NT$ ${e.twd}</p>
                            <button onclick="delExp(${e.id})" class="text-[9px] text-red-200 uppercase">Del</button>
                        </div>
                    </div>`;
            });
            document.getElementById('total-amount').innerText = 'NT$ ' + total.toLocaleString();
        }
        render();
    </script>
</body>
</html>
