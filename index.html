<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BUSAN TRIP 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,600&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #F5F2ED; font-family: 'Noto Sans TC', sans-serif; color: #4A342E; -webkit-tap-highlight-color: transparent; }
        .serif { font-family: 'Playfair Display', serif; }
        /* 日期按鈕樣式 */
        .date-btn.active { background-color: #4A342E !important; color: #F5F2ED !important; border-radius: 14px; }
        .date-btn { transition: all 0.3s ease; border: 1px solid #D1CDC7; }
        /* 時間軸線 */
        .timeline-line::before { content: ''; position: absolute; left: 2.25rem; top: 0; bottom: 0; width: 1px; background-color: #D1CDC7; z-index: 0; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        /* 標籤樣式 */
        .tag { font-size: 10px; padding: 2px 8px; border-radius: 6px; font-weight: bold; margin-right: 4px; }
        .tag-eat { background: #FEE2E2; color: #EF4444; }
        .tag-info { background: #DBEAFE; color: #2563EB; }
        .tag-buy { background: #FEF3C7; color: #D97706; }
    </style>
</head>
<body class="max-w-md mx-auto pb-40">

    <header class="p-8 pb-4">
        <p class="text-[10px] tracking-[0.3em] opacity-40 uppercase mb-1">May 2026 / Busan</p>
        <h1 class="serif text-4xl italic font-semibold">Travelogue</h1>
    </header>

    <nav class="flex gap-3 px-6 overflow-x-auto no-scrollbar pb-6 sticky top-0 bg-[#F5F2ED]/90 backdrop-blur-md z-30">
        <button onclick="setDay(1)" id="d1" class="date-btn active flex-shrink-0 w-14 py-3 text-center rounded-xl">
            <p class="text-[9px] uppercase opacity-50">Thu</p><p class="text-lg font-bold">13</p>
        </button>
        <button onclick="setDay(2)" id="d2" class="date-btn flex-shrink-0 w-14 py-3 text-center rounded-xl bg-white">
            <p class="text-[9px] uppercase opacity-50">Fri</p><p class="text-lg font-bold">14</p>
        </button>
        <button onclick="setDay(3)" id="d3" class="date-btn flex-shrink-0 w-14 py-3 text-center rounded-xl bg-white">
            <p class="text-[9px] uppercase opacity-50">Sat</p><p class="text-lg font-bold">15</p>
        </button>
        <button onclick="setDay(4)" id="d4" class="date-btn flex-shrink-0 w-14 py-3 text-center rounded-xl bg-white">
            <p class="text-[9px] uppercase opacity-50">Sun</p><p class="text-lg font-bold">16</p>
        </button>
        <button onclick="setDay(5)" id="d5" class="date-btn flex-shrink-0 w-14 py-3 text-center rounded-xl bg-white">
            <p class="text-[9px] uppercase opacity-50">Mon</p><p class="text-lg font-bold">17</p>
        </button>
        <button onclick="setDay(6)" id="d6" class="date-btn flex-shrink-0 w-14 py-3 text-center rounded-xl bg-white">
            <p class="text-[9px] uppercase opacity-50">Tue</p><p class="text-lg font-bold">18</p>
        </button>
    </nav>

    <main class="px-6 relative timeline-line min-h-[400px]" id="content-area">
        </main>

    <footer class="fixed bottom-0 left-0 right-0 bg-[#F5F2ED] border-t border-[#D1CDC7] p-8 max-w-md mx-auto z-40">
        <div class="flex justify-between items-end">
            <div>
                <p class="text-[10px] opacity-40 uppercase tracking-widest mb-1">Daily Spend</p>
                <h2 id="day-total" class="serif text-4xl italic font-bold">NT$ 0</h2>
            </div>
            <button onclick="openModal()" class="bg-[#4A342E] text-[#F5F2ED] w-12 h-12 rounded-full flex items-center justify-center shadow-xl active:scale-90 transition-transform">
                <span class="text-2xl">＋</span>
            </button>
        </div>
    </footer>

    <div id="modal" class="hidden fixed inset-0 bg-[#4A342E]/20 backdrop-blur-sm z-50 flex items-end">
        <div class="w-full bg-white rounded-t-[2.5rem] p-8 max-w-md mx-auto shadow-2xl">
            <div class="flex justify-between items-center mb-8">
                <h2 class="serif text-2xl italic">New Record</h2>
                <button onclick="closeModal()" class="text-gray-300 text-xl">✕</button>
            </div>
            <div class="space-y-6">
                <input id="in-name" type="text" placeholder="項目名稱 (如：烤腸)" class="w-full border-b border-gray-100 pb-2 outline-none text-lg">
                <div class="grid grid-cols-2 gap-4">
                    <select id="in-cat" class="border-b border-gray-100 pb-2 outline-none bg-transparent text-sm">
                        <option>🍔 飲食</option><option>🚌 交通</option><option>💄 美妝</option><option>🎟️ 門票</option><option>🎁 伴手禮</option>
                    </select>
                    <input id="in-krw" type="number" placeholder="韓幣 KRW" class="border-b border-gray-100 pb-2 outline-none text-sm">
                </div>
                <button onclick="addExpense()" class="w-full bg-[#4A342E] text-white py-4 rounded-2xl font-bold tracking-widest mt-4">SAVE</button>
            </div>
        </div>
    </div>

    <script>
        let currentDay = 1;
        const rate
