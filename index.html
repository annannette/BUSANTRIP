<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Busan Travel Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,600&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #F5F2ED; font-family: 'Noto Sans TC', sans-serif; color: #4A342E; -webkit-tap-highlight-color: transparent; }
        .serif { font-family: 'Playfair Display', serif; }
        .date-btn.active { background-color: #4A342E !important; color: #F5F2ED !important; }
        
        /* 三欄式標籤樣式 */
        .sub-tab { transition: all 0.3s; opacity: 0.4; padding-bottom: 8px; border-bottom: 2px solid transparent; font-size: 12px; letter-spacing: 0.1em; font-weight: 500; }
        .sub-tab.active { opacity: 1; border-bottom: 2px solid #4A342E; font-weight: bold; }
        
        .card { background: white; border-radius: 20px; border: 1px solid #E8E1D4; position: relative; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* 內容區塊切換 */
        .view-section { display: none; }
        .view-section.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        /* 垂直時間軸設計 */
        .timeline-container { position: relative; }
        .timeline-line { position: absolute; left: 45px; top: 0; bottom: 0; width: 1px; background-color: #D1CDC7; z-index: 0; }
        .timeline-item { position: relative; z-index: 1; display: flex; gap: 20px; margin-bottom: 2rem; }
        
        /* 時間軸圓點與顏色區分 */
        .timeline-dot { width: 10px; height: 10px; border-radius: 50%; margin-top: 20px; border: 2px solid #F5F2ED; position: relative; z-index: 2; flex-shrink: 0; }
        .dot-food { background: #E67E22; box-shadow: 0 0 0 2px rgba(230, 126, 34, 0.2); } /* 用餐：橘色 */
        .dot-spot { background: #4A342E; box-shadow: 0 0 0 2px rgba(74, 52, 46, 0.2); }  /* 景點：深棕色 */
        
        .tag-must { background: #FEE2E2; color: #EF4444; font-size: 10px; padding: 2px 8px; border-radius: 6px; font-weight: bold; }
    </style>
</head>
<body class="max-w-md mx-auto pb-40">

    <header class="p-8 pb-4">
        <div class="flex justify-between items-end">
            <div>
                <p class="text-[10px] tracking-[0.3em] opacity-40 uppercase">May 2026 / Busan</p>
                <h1 class="serif text-4xl italic font-semibold text-[#4A342E]">Travelogue</h1>
            </div>
            <div class="text-right pb-1">
                <p class="text-xs font-bold text-[#4A342E]">釜山 22°C 🌤️</p>
            </div>
        </div>
    </header>

    <nav class="flex gap-3 px-6 overflow-x-auto no-scrollbar pb-4 sticky top-0 bg-[#F5F2ED]/95 backdrop-blur-md z-30">
        <button onclick="setDay(1)" id="d1" class="date-btn active flex-shrink-0 w-14 py-3 text-center border border-[#D1CDC7] rounded-xl bg-white shadow-sm">
            <p class="text-[9px] uppercase opacity-50">Thu</p><p class="text-lg font-bold">13</p>
        </button>
        <button onclick="setDay(2)" id="d2" class="date-btn flex-shrink-0 w-14 py-3 text-center border border-[#D1CDC7] rounded-xl bg-white shadow-sm">
            <p class="text-[9px] uppercase opacity-50">Fri</p><p class="text-lg font-bold">14</p>
        </button>
        <button onclick="setDay(3)" id="d3" class="date-btn flex-shrink-0 w-14 py-3 text-center border border-[#D1CDC7] rounded-xl bg-white shadow-sm">
            <p class="text-[9px] uppercase opacity-50">Sat</p><p class="text-lg font-bold">15</p>
        </button>
        <button onclick="setDay(4)" id="d4" class="date-btn flex-shrink-0 w-14 py-3 text-center border border-[#D1CDC7] rounded-xl bg-white shadow-sm">
            <p class="text-[9px] uppercase opacity-50">Sun</p><p class="text-lg font-bold">16</p>
        </button>
        <button onclick="setDay(5)" id="d5" class="date-btn flex-shrink-0 w-14 py-3 text-center border border-[#D1CDC7] rounded-xl bg-white shadow-sm">
            <p class="text-[9px] uppercase opacity-50">Mon</p><p class="text-lg font-bold">17</p>
        </button>
        <button onclick="setDay(6)" id="d6" class="date-btn flex-shrink-0 w-14 py-3 text-center border border-[#D1CDC7] rounded-xl bg-white shadow-sm">
            <p class="text-[9px] uppercase opacity-50">Tue</p><p class="text-lg font-bold">18</p>
        </button>
    </nav>

    <div class="flex px-8 mb-6 gap-8 border-b border-[#D1CDC7]/30">
        <button onclick="showSection('itinerary')" id="tab-itinerary" class="sub-tab active">今日行程</button>
        <button onclick="showSection('expenses')" id="tab-expenses" class="sub-tab">記帳明細</button>
        <button onclick="showSection('info')" id="tab-info" class="sub-tab">航班住宿</button>
    </div>

    <main class="min-h-[400px]">
        <div id="view-itinerary" class="view-section active px-6 timeline-container">
            <div class="timeline-line"></div>
            <div id="itinerary-content"></div>
        </div>

        <div id="view-expenses" class="view-section px-6 space-y-6">
            <div class="card p-6 space-y-4 shadow-sm">
                <input id="in-name" type="text" placeholder="項目名稱" class="w-full border-b border-gray-100 pb-2 outline-none text-sm bg-transparent">
                <div class="grid grid-cols-2 gap-4">
                    <input id="in-krw" type="number" placeholder="韓幣 KRW" class="border-b border-gray-100 pb-2 outline-none text-sm bg-transparent">
                    <select id="in-cat" class="border-b border-gray-100 pb-2 outline-none text-sm bg-transparent">
                        <option>🍔 飲食</option><option>🚌 交通</option><option>💄 美妝</option><option>🎟️ 門票</option><option>🎁 伴手禮</option><option>👕 衣服</option>
                    </select>
                </div>
                <button onclick="addExp()" class="w-full bg-[#4A342E] text-white py-3 rounded-xl font-bold text-[10px] tracking-widest uppercase shadow-md">Add Record</button>
            </div>
            <div id="exp-list" class="space-y-3 pb-20"></div>
        </div>

        <div id="view-info" class="view-section px-6 space-y-6">
            <div class="card p-6 border-l-4 border-l-[#8E9775] shadow-sm">
                <h3 class="serif text-lg italic mb-4">Flight Info</h3>
                <div class="space-y-3 text-sm">
                    <div class="flex justify-between border-b border-dashed border-[#D1CDC7]/50 pb-2">
                        <span class="opacity-50">去程 BX 794</span><span class="font-bold uppercase">13:20 TPE</span>
                    </div>
                    <div class="flex justify-between border-b border-dashed border-[#D1CDC7]/50 pb-2">
                        <span class="opacity-50">回程 BX 793</span><span class="font-bold uppercase">11:05 PUS</span>
